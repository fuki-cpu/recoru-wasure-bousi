<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レコル警察 Notifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c1: #349FC9; --c2: #845FE0;
      --bg1: #0d1117; --bg2: #151b27;
      --surface: rgba(255,255,255,0.046);
      --surface2: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.053);
      --text: #f0f4ff;
      --muted: rgba(240,244,255,0.45);
      --dim: rgba(240,244,255,0.26);
      --green: #4ade80;
    }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 18% 8%, #0f1e30 0%, var(--bg1) 55%, var(--bg2) 100%);
      display: flex; align-items: flex-start; justify-content: center;
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', 'Segoe UI', system-ui, sans-serif;
      color: var(--text); padding: 28px 16px 48px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .orb-a {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(52,159,201,0.2) 0%, transparent 70%);
      top: -200px; left: -160px; animation: drift 12s ease-in-out infinite;
    }
    .orb-b {
      width: 440px; height: 440px;
      background: radial-gradient(circle, rgba(132,95,224,0.18) 0%, transparent 70%);
      bottom: -150px; right: -120px; animation: drift 10s ease-in-out infinite reverse;
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(18px,-25px) scale(1.03); }
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 460px;
      background: var(--surface);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 26px;
      transition: box-shadow 0.6s ease;
    }
    .card.live {
      box-shadow:
        0 0 0 1px rgba(52,159,201,0.18),
        0 0 50px rgba(52,159,201,0.1),
        0 0 100px rgba(132,95,224,0.07),
        0 24px 64px rgba(0,0,0,0.5);
    }
    .card:not(.live) { box-shadow: 0 24px 64px rgba(0,0,0,0.5); }

    /* ── Header ── */
    .hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .app-name {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--muted);
    }
    .app-dot {
      width: 22px; height: 22px; border-radius: 6px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      transition: all 0.35s ease;
    }
    .badge.on  { background: rgba(74,222,128,0.13); border: 1px solid rgba(74,222,128,0.28); color: var(--green); box-shadow: 0 0 10px rgba(74,222,128,0.15); }
    .badge.off { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--dim); }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge.on .badge-dot { animation: blink 2.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

    /* ── Clock ── */
    .clock-wrap {
      text-align: center; padding: 18px 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.055); margin-bottom: 18px;
    }
    .clock {
      font-family: 'Cascadia Mono','SF Mono','Consolas','Courier New',monospace;
      font-size: 3rem; font-weight: 700; letter-spacing: 0.03em; line-height: 1;
      background: linear-gradient(120deg, var(--c1) 0%, #6b7ff0 50%, var(--c2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .date-str { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }

    /* ── Section ── */
    .sec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 8px; padding-left: 2px;
    }
    .section {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 14px; padding: 14px; margin-bottom: 14px;
    }

    /* ── Notification content ── */
    .notif-content { display: flex; gap: 14px; align-items: center; }
    .icon-fixed {
      flex-shrink: 0; width: 76px; height: 76px; border-radius: 14px;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    }
    .icon-fixed img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      image-rendering: pixelated;
    }
    .notif-fields { flex: 1; display: flex; flex-direction: column; gap: 9px; }
    .field-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim); margin-bottom: 4px;
    }
    .fixed-title {
      font-size: 14px; font-weight: 700;
      background: linear-gradient(120deg, var(--c1), var(--c2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      padding: 4px 0;
    }
    .field-in {
      width: 100%; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 10px;
      font-size: 13px; color: var(--text); font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .field-in:focus { border-color: rgba(52,159,201,0.5); background: rgba(52,159,201,0.05); }

    /* ── Time slots ── */
    .slots-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .slot-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 9px 13px;
    }
    .slot-ico { font-size: 14px; flex-shrink: 0; }
    .time-in {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 16px; font-weight: 600; color: var(--text);
      font-family: 'Cascadia Mono','Consolas',monospace;
      letter-spacing: 0.04em; cursor: pointer;
    }
    .time-in::-webkit-calendar-picker-indicator { filter: invert(0.65); cursor: pointer; }
    .del-btn {
      background: none; border: none; cursor: pointer;
      color: var(--dim); font-size: 18px; padding: 0 2px;
      line-height: 1; transition: color 0.2s;
    }
    .del-btn:hover { color: rgba(248,113,113,0.9); }
    .add-slot {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
      background: none; border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 10px; padding: 9px 14px;
      color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
    }
    .add-slot:hover { border-color: rgba(52,159,201,0.4); color: rgba(52,159,201,0.85); background: rgba(52,159,201,0.05); }

    /* ── Countdown ── */
    .cd-box {
      text-align: center; padding: 14px 20px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 14px; margin-bottom: 14px;
    }
    .cd-lbl { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
    .cd-val { font-size: 1.05rem; font-weight: 600; color: var(--text); }
    .cd-val.dim { color: var(--muted); }

    /* ── Toggle ── */
    .div { height: 1px; background: rgba(255,255,255,0.055); margin: 14px 0; }
    .tog-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .tog-lbl { font-size: 14px; font-weight: 500; }
    .tog-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .switch { position: relative; width: 50px; height: 27px; cursor: pointer; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .trk {
      position: absolute; inset: 0; border-radius: 14px;
      background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.13);
      transition: all 0.35s ease;
    }
    .switch input:checked ~ .trk {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      border-color: transparent; box-shadow: 0 0 14px rgba(132,95,224,0.45);
    }
    .thm {
      position: absolute; top: 3px; left: 3px;
      width: 19px; height: 19px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 5px rgba(0,0,0,0.35);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .switch input:checked ~ .thm { transform: translateX(23px); }

    /* ── Test button ── */
    .test-btn {
      width: 100%; padding: 13px 20px; border: none; border-radius: 50px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.25s ease;
      margin-bottom: 16px; position: relative; overflow: hidden; font-family: inherit;
    }
    .test-btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background 0.2s; }
    .test-btn:hover { box-shadow: 0 6px 28px rgba(132,95,224,0.55); transform: translateY(-1px); }
    .test-btn:hover::after { background: rgba(255,255,255,0.08); }
    .test-btn:active { transform: translateY(0); box-shadow: none; }

    /* ── Permission ── */
    .perm {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 13px; border-radius: 10px; font-size: 12px; border: 1px solid transparent;
    }
    .perm.ok   { background: rgba(74,222,128,0.07);  border-color: rgba(74,222,128,0.2);  color: rgba(74,222,128,0.8); }
    .perm.warn { background: rgba(251,191,36,0.07);  border-color: rgba(251,191,36,0.2);  color: rgba(251,191,36,0.85); }
    .perm.bad  { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25);color: rgba(248,113,113,0.9); }
    .perm-note {
      margin-top: 8px; padding: 10px 13px;
      background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.13);
      border-radius: 10px; font-size: 12px; color: var(--muted); line-height: 1.65;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(74,222,128,0.92); color: #0a1a0e;
      padding: 9px 20px; border-radius: 50px;
      font-size: 13px; font-weight: 700;
      opacity: 0; transition: opacity 0.28s, transform 0.28s;
      pointer-events: none; white-space: nowrap; z-index: 99;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="orb orb-a"></div>
<div class="orb orb-b"></div>

<div class="card" id="card">

  <div class="hd">
    <div class="app-name">
      <span class="app-dot">🚨</span>

        <input type="checkbox" id="wday-tog">

        <div class="thm"></div>
      </label>
    </div>
  </div>

  <!-- Countdown -->
  <div class="cd-box">
    <div class="cd-lbl">次の通知まで</div>
    <div class="cd-val" id="cd">計算中...</div>
  </div>

  <div class="div"></div>

  <!-- Enable toggle -->
  <div class="tog-row">
    <span class="tog-lbl">通知を有効にする</span>
    <label class="switch">
      <input type="checkbox" id="en-tog">
      <div class="trk"></div>
      <div class="thm"></div>
    </label>
  </div>

  <!-- Test button -->
  <button class="test-btn" id="test-btn">今すぐテスト通知を送信</button>

  <!-- Permission -->
  <div id="perm-area"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── 固定設定 ──────────────────────────────────────────────────────────────────
const NOTIF_TITLE = 'レコル警察';
const NOTIF_ICON  = document.getElementById('notif-icon-img').src; // 埋め込み画像を使用

// ── JST ヘルパー ──────────────────────────────────────────────────────────────
const JST_OFF = 9 * 3600000;
function jstNow() {
  const n = new Date();
  return new Date(n.getTime() + n.getTimezoneOffset() * 60000 + JST_OFF);
}
const DAYS = ['日','月','火','水','木','金','土'];
function fmtDate(d) {
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}曜日）`;
}
function p2(n) { return String(n).padStart(2,'0'); }
function todayStr(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function slotKey(h, m) { return `${h}:${m}`; }

// ── 状態（localStorage から復元） ────────────────────────────────────────────
let enabled     = localStorage.getItem('mn_on')    !== 'false';
let weekdayOnly = localStorage.getItem('mn_wday')  !== 'false';
let notifTimes  = JSON.parse(localStorage.getItem('mn_times') || 'null') || [{h:9,m:28},{h:18,m:30}];
let notifBody   = localStorage.getItem('mn_body')  || 'レコル忘れてませんか？';
let fired       = JSON.parse(localStorage.getItem('mn_fired') || '{}');

function saveFired() { localStorage.setItem('mn_fired', JSON.stringify(fired)); }

// ── DOM ───────────────────────────────────────────────────────────────────────
const card    = document.getElementById('card');
const clockEl = document.getElementById('clock');
const dateEl  = document.getElementById('date-str');
const cdEl    = document.getElementById('cd');
const badgeEl = document.getElementById('badge');
const badgeTx = document.getElementById('badge-txt');
const toastEl = document.getElementById('toast');
const enTog   = document.getElementById('en-tog');
const wdTog   = document.getElementById('wday-tog');
const bodyIn  = document.getElementById('f-body');

// ── 時計 ──────────────────────────────────────────────────────────────────────
function tick() {
  const d = jstNow();
  clockEl.textContent = `${p2(d.getHours())}:${p2(d.getMinutes())}:${p2(d.getSeconds())}`;
  dateEl.textContent  = fmtDate(d);
  updateCountdown(d);
}

// ── カウントダウン ────────────────────────────────────────────────────────────
function updateCountdown(d) {
  if (notifTimes.length === 0) {
    cdEl.textContent = '通知時刻が設定されていません'; cdEl.className = 'cd-val dim'; return;
  }
  const dow = d.getDay();
  if (weekdayOnly && (dow === 0 || dow === 6)) {
    cdEl.textContent = '今日は週末のためスキップ'; cdEl.className = 'cd-val dim'; return;
  }
  const today   = todayStr(d);
  const nowMins = d.getHours() * 60 + d.getMinutes();
  const sorted  = [...notifTimes].sort((a,b) => a.h*60+a.m - b.h*60-b.m);

  for (const s of sorted) {
    const sm  = s.h * 60 + s.m;
    const key = slotKey(s.h, s.m);
    if (sm > nowMins && fired[key] !== today) {
      const target = new Date(d);
      target.setHours(s.h, s.m, 0, 0);
      const ts = Math.floor((target - d) / 1000);
      const hh = Math.floor(ts/3600), mm = Math.floor((ts%3600)/60), ss = ts%60;
      cdEl.textContent = hh > 0 ? `あと ${hh}時間 ${mm}分` : mm > 0 ? `あと ${mm}分 ${ss}秒` : `あと ${ss}秒`;
      cdEl.className = 'cd-val';
      return;
    }
  }
  cdEl.textContent = '本日の通知はすべて送信済み ✓'; cdEl.className = 'cd-val dim';
}

// ── 通知送信（Windows ポップアップ） ─────────────────────────────────────────
function fireNotif() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return false;
  new Notification(NOTIF_TITLE, { body: notifBody, icon: NOTIF_ICON });
  return true;
}

// ── スケジューラー（20秒ごと） ────────────────────────────────────────────────
function checkSchedule() {
  if (!enabled || Notification.permission !== 'granted') return;
  const d   = jstNow();
  const dow = d.getDay();
  if (weekdayOnly && (dow === 0 || dow === 6)) return;
  const today = todayStr(d);
  for (const s of notifTimes) {
    if (d.getHours() === s.h && d.getMinutes() === s.m) {
      const key = slotKey(s.h, s.m);
      if (fired[key] !== today) {
        fired[key] = today;
        saveFired();
        fireNotif();
      }
    }
  }
}

// ── 時刻スロット UI ───────────────────────────────────────────────────────────
function renderSlots() {
  const list = document.getElementById('slots-list');
  list.innerHTML = '';
  notifTimes.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML = `
      <span class="slot-ico">⏰</span>
      <input type="time" class="time-in" value="${p2(s.h)}:${p2(s.m)}" data-i="${i}">
      <button class="del-btn" data-i="${i}" title="削除">×</button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.time-in').forEach(inp => {
    inp.addEventListener('change', e => {
      const i = +e.target.dataset.i;
      const [h, m] = e.target.value.split(':').map(Number);
      notifTimes[i] = { h, m };
      localStorage.setItem('mn_times', JSON.stringify(notifTimes));
    });
  });
  list.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      notifTimes.splice(+e.target.dataset.i, 1);
      localStorage.setItem('mn_times', JSON.stringify(notifTimes));
      renderSlots();
    });
  });
}

function addSlot() {
  notifTimes.push({ h: 9, m: 0 });
  localStorage.setItem('mn_times', JSON.stringify(notifTimes));
  renderSlots();
}

// ── メッセージ入力 ────────────────────────────────────────────────────────────
bodyIn.value = notifBody;
bodyIn.addEventListener('input', () => {
  notifBody = bodyIn.value;
  localStorage.setItem('mn_body', notifBody);
});

// ── 有効トグル ────────────────────────────────────────────────────────────────
function applyEnabled() {
  enTog.checked = enabled;
  if (enabled) { card.classList.add('live'); badgeEl.className='badge on'; badgeTx.textContent='有効'; }
  else          { card.classList.remove('live'); badgeEl.className='badge off'; badgeTx.textContent='無効'; }
}
enTog.addEventListener('change', () => {
  enabled = enTog.checked;
  localStorage.setItem('mn_on', enabled);
  applyEnabled();
  if (enabled && 'Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().then(renderPerm);
  }
});

// ── 平日トグル ────────────────────────────────────────────────────────────────
wdTog.checked = weekdayOnly;
wdTog.addEventListener('change', () => {
  weekdayOnly = wdTog.checked;
  localStorage.setItem('mn_wday', weekdayOnly);
});

// ── テストボタン ──────────────────────────────────────────────────────────────
document.getElementById('test-btn').addEventListener('click', () => {
  if (!('Notification' in window)) { showToast('通知未対応のブラウザです'); return; }
  if (Notification.permission === 'denied') { showToast('通知がブロックされています'); return; }
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      renderPerm(p);
      if (p === 'granted') { fireNotif(); showToast('通知を送信しました ✓'); }
    });
    return;
  }
  fireNotif();
  showToast('通知を送信しました ✓');
});

// ── 通知許可 UI ───────────────────────────────────────────────────────────────
function renderPerm(p) {
  const area = document.getElementById('perm-area');
  if (!('Notification' in window)) {
    area.innerHTML = `<div class="perm bad">⚠️ このブラウザは通知をサポートしていません</div>`; return;
  }
  const map = {
    granted: ['ok',  '✓', '通知の許可が付与されています'],
    default: ['warn','!', '通知を許可するとスケジュール通知が届きます'],
    denied:  ['bad', '✕', '通知がブロックされています'],
  };
  const [cls, icon, msg] = map[p] || map.default;
  let html = `<div class="perm ${cls}"><span>${icon}</span><span>${msg}</span></div>`;
  if (p === 'denied') {
    html += `<div class="perm-note">🔒 アドレスバーの鍵アイコン →「通知」→「許可」に変更してください。</div>`;
  }
  area.innerHTML = html;
}

// ── トースト ──────────────────────────────────────────────────────────────────
let toastTmr;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => toastEl.classList.remove('show'), 2600);
}

// ── 初期化 ────────────────────────────────────────────────────────────────────
applyEnabled();
renderSlots();
tick();
setInterval(tick, 1000);
setInterval(checkSchedule, 20000);

if ('Notification' in window) {
  renderPerm(Notification.permission);
  if (enabled && Notification.permission === 'default') {
    Notification.requestPermission().then(renderPerm);
  }
} else {
  renderPerm('unsupported');
}
</script>
</body>
</html>
